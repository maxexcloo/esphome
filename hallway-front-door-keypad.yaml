substitutions:
  name: hallway-front-door-keypad
  name_friendly: Hallway Front Door Keypad

api:
  encryption:
    key: !secret api_encryption_key

button:
  - platform: restart
    entity_category: diagnostic
    name: ESP Reboot

esp32:
  board: m5stack-atom
  framework:
    type: esp-idf

esphome:
  friendly_name: ${name_friendly}
  name: ${name}

external_components:
  - source: github://pierluigizagaria/switchbot-keypad-bridge
    components: [switchbot_keypad_bridge]

light:
  - platform: esp32_rmt_led_strip
    chipset: sk6812
    id: status_led
    internal: true
    name: Status LED
    num_leds: 1
    pin: GPIO27
    rgb_order: GRB

logger:
  level: WARN

ota:
  - platform: esphome
    password: !secret ota_password

safe_mode:

sensor:
  - platform: internal_temperature
    disabled_by_default: true
    entity_category: diagnostic
    name: ESP Temperature
  - platform: uptime
    disabled_by_default: true
    entity_category: diagnostic
    id: sys_uptime
    name: Uptime
    update_interval: 60s
  - platform: wifi_signal
    disabled_by_default: true
    entity_category: diagnostic
    id: wifi_signal_db
    name: WiFi Signal
    update_interval: 60s

text_sensor:
  - platform: version
    entity_category: diagnostic
    hide_timestamp: true
    name: ESPHome Version
  - platform: wifi_info
    ip_address:
      entity_category: diagnostic
      name: IP Address
    mac_address:
      entity_category: diagnostic
      name: MAC Address

time:
  - platform: sntp
      
web_server:
  port: 80
  version: 3

wifi:
  password: !secret wifi_password
  ssid: !secret wifi_ssid
