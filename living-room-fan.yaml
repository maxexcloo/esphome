substitutions:
  name: living-room-fan
  name_friendly: Living Room Fan

api:
  encryption:
    key: !secret api_encryption_key

binary_sensor:
  - platform: gpio
    internal: true
    name: Toggle
    on_release:
      - fan.toggle: vornado
    pin:
      inverted: true
      mode:
        input: true
        pullup: true
      number: GPIO2
  - platform: status
    entity_category: diagnostic
    name: Online

button:
  - platform: restart
    entity_category: diagnostic
    name: ESP Reboot

esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework:
    type: esp-idf

esphome:
  friendly_name: ${name_friendly}
  name: ${name}

external_components:
  - source: github://maxexcloo/esp-mcp4x-digipot

fan:
  - platform: mcp4xxx
    id: vornado
    mcp4xxx_id: digipot
    name: Fan
    restore_mode: RESTORE_DEFAULT_OFF
    speed_count: 100

logger:
  level: WARN

mcp4xxx:
  - cs_pin: GPIO18
    id: digipot
    initial_value: 0
    internal: true

ota:
  - platform: esphome
    password: !secret ota_password

safe_mode:

sensor:
  - platform: internal_temperature
    disabled_by_default: true
    entity_category: diagnostic
    name: ESP Temperature
  - platform: rotary_encoder
    internal: true
    name: Control
    on_anticlockwise:
      - lambda: |-
          int fan_speed = id(vornado).speed - 5;

          if (fan_speed < 1) {
            auto call = id(vornado).turn_off();
            call.perform();
            return;
          }

          auto call = id(vornado).turn_on();
          call.set_speed(fan_speed);
          call.perform();
    on_clockwise:
      - lambda: |-
          int fan_speed = id(vornado).speed + 5;

          if (fan_speed > 100) {
            fan_speed = 100;
          }

          auto call = id(vornado).turn_on();
          call.set_speed(fan_speed);
          call.perform();
    pin_a: GPIO22
    pin_b: GPIO23
  - platform: uptime
    disabled_by_default: true
    entity_category: diagnostic
    name: Uptime
    update_interval: 60s
  - platform: wifi_signal
    disabled_by_default: true
    entity_category: diagnostic
    name: WiFi Signal
    update_interval: 60s

spi:
  clk_pin: GPIO19
  mosi_pin: GPIO20

text_sensor:
  - platform: version
    entity_category: diagnostic
    hide_timestamp: true
    name: ESPHome Version
  - platform: wifi_info
    ip_address:
      entity_category: diagnostic
      name: IP Address
    mac_address:
      entity_category: diagnostic
      name: MAC Address

web_server:
  port: 80
  version: 3

wifi:
  password: !secret wifi_password
  ssid: !secret wifi_ssid
