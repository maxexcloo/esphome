substitutions:
  name: kitchen-presence-sensor
  name_friendly: Kitchen Presence Sensor

api:
  encryption:
    key: !secret api_encryption_key

binary_sensor:
  - platform: seeed_mr60bha2
    fall_detected:
      name: Radar Fall Detected
    has_target:
      name: Radar Target
    presence:
      name: Radar Presence
  - platform: status
    entity_category: diagnostic
    name: Online

button:
  - platform: restart
    entity_category: diagnostic
    name: ESP Reboot

esp32:
  board: seeed_xiao_esp32c6
  variant: esp32c6
  framework:
    type: esp-idf

esphome:
  friendly_name: ${name_friendly}
  name: ${name}

i2c:
  scl: GPIO23
  sda: GPIO22

light:
  - platform: esp32_rmt_led_strip
    chipset: ws2812
    internal: true
    name: Status LED
    num_leds: 1
    pin: GPIO1
    rgb_order: GRB

logger:
  level: WARN

ota:
  - platform: esphome
    password: !secret ota_password

safe_mode:

seeed_mr60bha2:

sensor:
  - platform: bh1750
    name: Illuminance
  - platform: internal_temperature
    disabled_by_default: true
    entity_category: diagnostic
    name: ESP Temperature
  - platform: seeed_mr60bha2
    breath_rate:
      name: Respiratory Rate
    distance:
      name: Distance
    heart_rate:
      name: Heart Rate
    num_targets:
      name: Target Count
  - platform: uptime
    disabled_by_default: true
    entity_category: diagnostic
    id: sys_uptime
    name: Uptime
    update_interval: 60s
  - platform: wifi_signal
    disabled_by_default: true
    entity_category: diagnostic
    id: wifi_signal_db
    name: WiFi Signal
    update_interval: 60s

text_sensor:
  - platform: version
    entity_category: diagnostic
    hide_timestamp: true
    name: ESPHome Version
  - platform: wifi_info
    ip_address:
      entity_category: diagnostic
      name: IP Address
    mac_address:
      entity_category: diagnostic
      name: MAC Address

uart:
  baud_rate: 115200
  rx_pin: GPIO17
  tx_pin: GPIO16

web_server:
  port: 80
  version: 3

wifi:
  password: !secret wifi_password
  ssid: !secret wifi_ssid
