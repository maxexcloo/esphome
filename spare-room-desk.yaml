substitutions:
  name: spare-room-desk
  name_friendly: Spare Room Desk
  rx_pin: GPIO26
  tx_pin: GPIO32

api:
  encryption:
    key: !secret api_encryption_key

esp32:
  board: m5stack-atom
  framework:
    type: esp-idf

esphome:
  friendly_name: ${name_friendly}
  name: ${name}
  name_add_mac_suffix: false

logger:
  level: WARN

ota:
  - id: !extend ota_esphome
    password: !secret ota_password

packages:
  deskup_pro: github://SmartHomeGuys/DeskUp-Pro-Controller-RJ12/deskup-pro-controller.yaml

safe_mode:

sensor:
  - platform: wifi_signal
    disabled_by_default: true
    entity_category: diagnostic
    name: WiFi Signal
    update_interval: 60s

wifi:
  password: !secret wifi_password
  ssid: !secret wifi_ssid
